name: Build MiniPlasma
on:
  push:
    branches: [ main ]
    paths:
      - 'MiniPlasma/**'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'MiniPlasma/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2
      with:
        nuget-version: 'latest'

    - name: Clear NuGet http cache
      shell: pwsh
      run: nuget locals http-cache -clear

    - name: Restore NuGet packages
      shell: pwsh
      run: nuget restore MiniPlasma/PoC_AbortHydration_ArbitraryRegKey_EoP.sln -NonInteractive

    - name: Verify and fix NtApiDotNet.dll
      shell: pwsh
      run: |
        $dll = Resolve-Path "MiniPlasma/packages/NtApiDotNet.1.1.33/lib/net461/NtApiDotNet.dll"
        Write-Host "DLL size: $((Get-Item $dll).Length) bytes"
        $valid = $false
        try {
          $asm = [System.Reflection.Assembly]::LoadFile($dll)
          Write-Host "Valid assembly: $($asm.FullName)"
          $valid = $true
        } catch {
          Write-Host "Invalid assembly, re-downloading..."
        }
        if (-not $valid) {
          $nupkg = "$env:TEMP\NtApiDotNet.1.1.33.nupkg"
          Invoke-WebRequest "https://www.nuget.org/api/v2/package/NtApiDotNet/1.1.33" -OutFile $nupkg
          $extract = "$env:TEMP\NtApiDotNet_extracted"
          Expand-Archive $nupkg -DestinationPath $extract -Force
          Copy-Item "$extract\lib\net461\NtApiDotNet.dll" $dll -Force
          Write-Host "Re-download complete, new size: $((Get-Item $dll).Length) bytes"
        }

    - name: Build solution
      shell: pwsh
      run: >
        msbuild MiniPlasma/PoC_AbortHydration_ArbitraryRegKey_EoP.sln
        /p:Configuration=Release
        /p:SignManifests=false
        /p:SignAssembly=false
        /m

    - name: Upload build artifacts
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: MiniPlasma-build
        path: |
          MiniPlasma/**/bin/Release/**/*.exe
          MiniPlasma/**/bin/Release/**/*.dll
          MiniPlasma/**/Release/**/*.exe
          MiniPlasma/**/Release/**/*.dll
        if-no-files-found: error
        retention-days: 30
